name: The Daily Dreck
on:
  schedule:
    - cron: '0 * * * *'
    - cron: '15 11 * * *'
    - cron: '15 12 * * *'
  workflow_dispatch:
    inputs:
      run_blurbs:
        description: 'Also regenerate editorial blurbs?'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-dreck
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Determine what to run
        id: mode
        run: |
          HOUR_MT=$(TZ=America/Denver date +%H)
          MIN_MT=$(TZ=America/Denver date +%M)
          echo "Mountain Time: ${HOUR_MT}:${MIN_MT}"

          echo "run_news=true" >> $GITHUB_OUTPUT

          if [ "$HOUR_MT" = "05" ] && [ "$MIN_MT" -ge "10" ] && [ "$MIN_MT" -le "20" ]; then
            echo "run_blurbs=true" >> $GITHUB_OUTPUT
            echo "Mode: FULL (blurbs + news)"
          elif [ "${{ github.event.inputs.run_blurbs }}" = "true" ]; then
            echo "run_blurbs=true" >> $GITHUB_OUTPUT
            echo "Mode: FULL (manual blurbs + news)"
          else
            echo "run_blurbs=false" >> $GITHUB_OUTPUT
            echo "Mode: NEWS ONLY"
          fi

      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync to absolute latest commit
        run: |
          git fetch origin main
          git reset --hard FETCH_HEAD
          echo "Now at commit: $(git rev-parse HEAD)"
          echo "Latest file check:"
          grep -c "Subscriptions" index.html && echo "New index.html confirmed" || echo "WARNING: old index.html"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.mode.outputs.run_blurbs == 'true'
        run: pip install anthropic

      - name: Generate editorial blurbs
        if: steps.mode.outputs.run_blurbs == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate-blurbs.py

      - name: Fetch news feeds
        run: python3 fetch-news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-dreck-blurbs.json daily-dreck-news.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            MODE="${{ steps.mode.outputs.run_blurbs == 'true' && 'Full update' || 'News refresh' }}"
            git commit -m "${MODE} — $(TZ=America/Denver date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp daily-dreck-blurbs.json _site/ 2>/dev/null || true
          cp daily-dreck-news.json _site/ 2>/dev/null || true
          echo "Deploy directory contents:"
          ls -la _site/
          echo "Index.html size: $(wc -c < _site/index.html) bytes"
          head -5 _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
